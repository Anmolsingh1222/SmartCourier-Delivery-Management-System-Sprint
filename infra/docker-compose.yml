version: "3.9"

services:
  mysql:
    image: mysql:8.4
    container_name: smartcourier-mysql
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_USER: smartcourier
      MYSQL_PASSWORD: smartcourier
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./mysql/init:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-proot"]
      interval: 10s
      timeout: 5s
      retries: 10

volumes:
  mysql_data:
