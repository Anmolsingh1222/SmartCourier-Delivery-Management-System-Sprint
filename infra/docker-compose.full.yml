services:
  mysql:
    image: mysql:8.4
    container_name: smartcourier-mysql
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_USER: smartcourier
      MYSQL_PASSWORD: smartcourier
    ports:
      - "3307:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./mysql/init:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-proot"]
      interval: 10s
      timeout: 5s
      retries: 10

  rabbitmq:
    image: rabbitmq:3.13-management
    container_name: smartcourier-rabbitmq
    environment:
      RABBITMQ_DEFAULT_USER: smartcourier
      RABBITMQ_DEFAULT_PASS: smartcourier
    ports:
      - "5672:5672"
      - "15672:15672"
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq

  zipkin:
    image: openzipkin/zipkin:2.24
    container_name: smartcourier-zipkin
    ports:
      - "9411:9411"

  sonarqube-db:
    image: postgres:16-alpine
    container_name: smartcourier-sonarqube-db
    environment:
      POSTGRES_DB: sonarqube
      POSTGRES_USER: sonar
      POSTGRES_PASSWORD: sonar
    volumes:
      - sonarqube_db_data:/var/lib/postgresql/data

  sonarqube:
    image: sonarqube:9.9-community
    container_name: smartcourier-sonarqube
    depends_on:
      - sonarqube-db
    environment:
      SONAR_JDBC_URL: jdbc:postgresql://sonarqube-db:5432/sonarqube
      SONAR_JDBC_USERNAME: sonar
      SONAR_JDBC_PASSWORD: sonar
    ports:
      - "9000:9000"
    volumes:
      - sonarqube_data:/opt/sonarqube/data
      - sonarqube_extensions:/opt/sonarqube/extensions
      - sonarqube_logs:/opt/sonarqube/logs

  eureka-server:
    build:
      context: ..
      dockerfile: services/eureka-server/Dockerfile
    ports:
      - "8762:8761"
    environment:
      MANAGEMENT_TRACING_SAMPLING_PROBABILITY: "1.0"
      MANAGEMENT_ZIPKIN_TRACING_ENDPOINT: http://zipkin:9411/api/v2/spans

  auth-service:
    build:
      context: ..
      dockerfile: services/auth-service/Dockerfile
    environment:
      MYSQL_HOST: mysql
      MYSQL_PORT: 3306
      MYSQL_USER: smartcourier
      MYSQL_PASSWORD: smartcourier
      SPRING_RABBITMQ_HOST: rabbitmq
      SPRING_RABBITMQ_PORT: 5672
      SPRING_RABBITMQ_USERNAME: smartcourier
      SPRING_RABBITMQ_PASSWORD: smartcourier
      JWT_SECRET: smartcourier-super-secret-key-change-in-prod-32-plus-bytes
      EUREKA_DEFAULT_ZONE: http://eureka-server:8761/eureka/
      MANAGEMENT_TRACING_SAMPLING_PROBABILITY: "1.0"
      MANAGEMENT_ZIPKIN_TRACING_ENDPOINT: http://zipkin:9411/api/v2/spans
    depends_on:
      mysql:
        condition: service_healthy
      eureka-server:
        condition: service_started

  delivery-service:
    build:
      context: ..
      dockerfile: services/delivery-service/Dockerfile
    environment:
      MYSQL_HOST: mysql
      MYSQL_PORT: 3306
      MYSQL_USER: smartcourier
      MYSQL_PASSWORD: smartcourier
      SPRING_RABBITMQ_HOST: rabbitmq
      SPRING_RABBITMQ_PORT: 5672
      SPRING_RABBITMQ_USERNAME: smartcourier
      SPRING_RABBITMQ_PASSWORD: smartcourier
      TRACKING_SERVICE_URL: http://tracking-service:8083
      EUREKA_DEFAULT_ZONE: http://eureka-server:8761/eureka/
      MANAGEMENT_TRACING_SAMPLING_PROBABILITY: "1.0"
      MANAGEMENT_ZIPKIN_TRACING_ENDPOINT: http://zipkin:9411/api/v2/spans
    depends_on:
      mysql:
        condition: service_healthy
      tracking-service:
        condition: service_started
      eureka-server:
        condition: service_started

  tracking-service:
    build:
      context: ..
      dockerfile: services/tracking-service/Dockerfile
    environment:
      MYSQL_HOST: mysql
      MYSQL_PORT: 3306
      MYSQL_USER: smartcourier
      MYSQL_PASSWORD: smartcourier
      SPRING_RABBITMQ_HOST: rabbitmq
      SPRING_RABBITMQ_PORT: 5672
      SPRING_RABBITMQ_USERNAME: smartcourier
      SPRING_RABBITMQ_PASSWORD: smartcourier
      EUREKA_DEFAULT_ZONE: http://eureka-server:8761/eureka/
      MANAGEMENT_TRACING_SAMPLING_PROBABILITY: "1.0"
      MANAGEMENT_ZIPKIN_TRACING_ENDPOINT: http://zipkin:9411/api/v2/spans
    depends_on:
      mysql:
        condition: service_healthy
      eureka-server:
        condition: service_started

  admin-service:
    build:
      context: ..
      dockerfile: services/admin-service/Dockerfile
    environment:
      MYSQL_HOST: mysql
      MYSQL_PORT: 3306
      MYSQL_USER: smartcourier
      MYSQL_PASSWORD: smartcourier
      SPRING_RABBITMQ_HOST: rabbitmq
      SPRING_RABBITMQ_PORT: 5672
      SPRING_RABBITMQ_USERNAME: smartcourier
      SPRING_RABBITMQ_PASSWORD: smartcourier
      EUREKA_DEFAULT_ZONE: http://eureka-server:8761/eureka/
      MANAGEMENT_TRACING_SAMPLING_PROBABILITY: "1.0"
      MANAGEMENT_ZIPKIN_TRACING_ENDPOINT: http://zipkin:9411/api/v2/spans
    depends_on:
      mysql:
        condition: service_healthy
      eureka-server:
        condition: service_started

  api-gateway:
    build:
      context: ..
      dockerfile: services/api-gateway/Dockerfile
    ports:
      - "8088:8080"
    environment:
      JWT_SECRET: smartcourier-super-secret-key-change-in-prod-32-plus-bytes
      EUREKA_DEFAULT_ZONE: http://eureka-server:8761/eureka/
      SPRING_RABBITMQ_HOST: rabbitmq
      SPRING_RABBITMQ_PORT: 5672
      SPRING_RABBITMQ_USERNAME: smartcourier
      SPRING_RABBITMQ_PASSWORD: smartcourier
      MANAGEMENT_TRACING_SAMPLING_PROBABILITY: "1.0"
      MANAGEMENT_ZIPKIN_TRACING_ENDPOINT: http://zipkin:9411/api/v2/spans
    depends_on:
      - eureka-server
      - auth-service
      - delivery-service
      - tracking-service
      - admin-service

  web:
    build:
      context: ../frontend/web
      dockerfile: Dockerfile
      args:
        VITE_API_BASE_URL: /gateway
    ports:
      - "5174:80"
    depends_on:
      - api-gateway

volumes:
  mysql_data:
  rabbitmq_data:
  sonarqube_db_data:
  sonarqube_data:
  sonarqube_extensions:
  sonarqube_logs:
