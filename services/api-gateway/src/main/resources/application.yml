server:
  port: ${PORT:8080}

spring:
  application:
    name: api-gateway
  cloud:
    gateway:
      globalcors:
        cors-configurations:
          '[/**]':
            allowedOriginPatterns: ${ALLOWED_ORIGIN_PATTERNS:http://localhost:5173,http://localhost:5174}
            allowedMethods:
              - GET
              - POST
              - PUT
              - DELETE
              - OPTIONS
            allowedHeaders: "*"
            exposedHeaders: "*"

eureka:
  client:
    service-url:
      defaultZone: ${EUREKA_DEFAULT_ZONE:http://localhost:8762/eureka/}
  instance:
    prefer-ip-address: true

management:
  endpoints:
    web:
      exposure:
        include: health,info
  tracing:
    sampling:
      probability: ${MANAGEMENT_TRACING_SAMPLING_PROBABILITY:1.0}
  zipkin:
    tracing:
      endpoint: ${MANAGEMENT_ZIPKIN_TRACING_ENDPOINT:http://localhost:9411/api/v2/spans}

security:
  jwt:
    secret: ${JWT_SECRET:smartcourier-super-secret-key-change-in-prod-32-plus-bytes}

springdoc:
  swagger-ui:
    path: /swagger-ui.html
    urls:
      - name: api-gateway
        url: /v3/api-docs
      - name: auth-service
        url: /gateway/auth/v3/api-docs
      - name: delivery-service
        url: /gateway/deliveries/v3/api-docs
      - name: tracking-service
        url: /gateway/tracking/v3/api-docs
      - name: admin-service
        url: /gateway/admin/v3/api-docs
