server:
  port: 8081

spring:
  application:
    name: auth-service
  datasource:
    url: jdbc:mysql://${MYSQL_HOST:127.0.0.1}:${MYSQL_PORT:3307}/auth_db?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
    username: ${MYSQL_USER:smartcourier}
    password: ${MYSQL_PASSWORD:smartcourier}
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
  flyway:
    enabled: true
    baseline-on-migrate: true
  rabbitmq:
    host: ${SPRING_RABBITMQ_HOST:localhost}
    port: ${SPRING_RABBITMQ_PORT:5672}
    username: ${SPRING_RABBITMQ_USERNAME:smartcourier}
    password: ${SPRING_RABBITMQ_PASSWORD:smartcourier}

security:
  jwt:
    secret: ${JWT_SECRET:smartcourier-super-secret-key-change-in-prod-32-plus-bytes}
    access-ttl-seconds: 3600
    refresh-ttl-seconds: 2592000

bootstrap:
  admin:
    enabled: ${BOOTSTRAP_ADMIN_ENABLED:true}
    name: ${BOOTSTRAP_ADMIN_NAME:Platform Admin}
    email: ${BOOTSTRAP_ADMIN_EMAIL:admin@smartcourier.local}
    password: ${BOOTSTRAP_ADMIN_PASSWORD:Admin@12345}
