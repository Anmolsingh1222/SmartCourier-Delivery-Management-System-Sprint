server:
  port: 8083

spring:
  application:
    name: tracking-service
  datasource:
    url: jdbc:mysql://${MYSQL_HOST:127.0.0.1}:${MYSQL_PORT:3307}/tracking_db?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
    username: ${MYSQL_USER:smartcourier}
    password: ${MYSQL_PASSWORD:smartcourier}
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
  flyway:
    enabled: true
    baseline-on-migrate: true
  rabbitmq:
    host: ${SPRING_RABBITMQ_HOST:localhost}
    port: ${SPRING_RABBITMQ_PORT:5672}
    username: ${SPRING_RABBITMQ_USERNAME:smartcourier}
    password: ${SPRING_RABBITMQ_PASSWORD:smartcourier}
  mail:
    host: ${MAIL_HOST:smtp.gmail.com}
    port: ${MAIL_PORT:587}
    username: ${MAIL_USERNAME:}
    password: ${MAIL_PASSWORD:}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true

notifications:
  email:
    enabled: ${NOTIFICATIONS_EMAIL_ENABLED:false}
    from: ${NOTIFICATIONS_EMAIL_FROM:noreply@smartcourier.local}
