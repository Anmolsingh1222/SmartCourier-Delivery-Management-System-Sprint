server:
  port: 8080

spring:
  application:
    name: api-gateway
  cloud:
    gateway:
      globalcors:
        cors-configurations:
          '[/**]':
            allowedOriginPatterns: ${ALLOWED_ORIGIN_PATTERNS:http://localhost:5173,http://localhost:5174}
            allowedMethods: [GET, POST, PUT, DELETE, OPTIONS]
            allowedHeaders: "*"
            exposedHeaders: "*"
  rabbitmq:
    host: ${SPRING_RABBITMQ_HOST:localhost}
    port: ${SPRING_RABBITMQ_PORT:5672}
    username: ${SPRING_RABBITMQ_USERNAME:smartcourier}
    password: ${SPRING_RABBITMQ_PASSWORD:smartcourier}

security:
  jwt:
    secret: ${JWT_SECRET:smartcourier-super-secret-key-change-in-prod-32-plus-bytes}
